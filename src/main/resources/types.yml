  name: "#5dad58{inherit}"
  overrides:
    OLIVE:
      model: olive
    PISTACHIO:
      model: pistachio
    RHUBARB:
      model: rhubarb
    GARLIC:
      model: garlic
  model: olive

###Veggies — cut (pan + pot)
vegetable_cut:
  name: "#5dad58{inherit} (Cut)"
  overrides:
    CARROT:
      model: carrot_cut
    POTATO:
      model: potato_cut
    TOMATO:
      model: tomato_cut
    ONION:
      model: onion_cut
    LETTUCE:
      model: lettuce_cut
    CUCUMBER:
      model: cucumber_cut
    CORN:
      model: corn_cut
